sorting:
  threshold_multiplier: 4.0
  min_isi_ms: 1.5
  n_pca_components: 3

binning:
  bin_width_ms: 50
  smoothing_sigma_ms: 25
  normalize: true

pca:
  n_components: 15
  variance_threshold: 0.90

model:
  type: lstm
  hidden_size: 256
  num_layers: 2
  dropout: 0.3

training:
  lr: 0.001
  weight_decay: 0.0001
  l1_lambda: 0.00001
  max_epochs: 30
  patience: 5
  batch_size: 32
