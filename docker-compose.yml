services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    image: ntd:api
    container_name: ntd-api
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5001
      MLFLOW_MODEL_NAME: neural-spiketrain-analysis
      MLFLOW_PCA_ARTIFACT_PATH: artifacts/pca.pkl
    ports:
      - "8000:8000"
    depends_on:
      mlflow:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.3
    container_name: ntd-mlflow
    command: >-
      mlflow server
      --backend-store-uri sqlite:////mlflow/mlruns.db
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow

  prefect-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile.train
    image: ntd:train
    container_name: ntd-prefect-agent
    command: prefect agent start --pool default-agent-pool
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5001
      PREFECT_API_URL: ${PREFECT_API_URL:-http://host.docker.internal:4200/api}
      PREFECT_LOGGING_LEVEL: INFO
    depends_on:
      mlflow:
        condition: service_started

volumes:
  mlflow_data:
