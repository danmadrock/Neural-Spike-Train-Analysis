stages:
  sort:
    cmd: PYTHONPATH=. python flows/training_flow.py --stage sort
    deps:
      - data/raw/
      - src/sorting/
      - configs/sorting/
    outs:
      - data/sorted/
    params:
      - params.yaml:
          - sorting

  bin:
    cmd: PYTHONPATH=. python flows/training_flow.py --stage bin
    deps:
      - data/sorted/
      - src/binning/
      - configs/binning/
    outs:
      - data/binned/
    params:
      - params.yaml:
          - binning

  reduce:
    cmd: PYTHONPATH=. python flows/training_flow.py --stage reduce
    deps:
      - data/binned/
      - src/reduction/
      - configs/pca/
    outs:
      - data/pca/
    params:
      - params.yaml:
          - pca

  train:
    cmd: PYTHONPATH=. python flows/training_flow.py --stage train
    deps:
      - data/pca/
      - src/models/
      - src/training/
      - configs/model/
      - configs/training/
    params:
      - params.yaml:
          - model
          - training
